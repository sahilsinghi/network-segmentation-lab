name: network-seg-lab

mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.20.20.0/24

topology:

  # ─── Zone bridges (L2 segments) ──────────────────────────────────────────
  nodes:
    br-dmz:
      kind: bridge

    br-internal:
      kind: bridge

    br-data:
      kind: bridge

    br-mgmt:
      kind: bridge

    # ─── Firewall / Router ───────────────────────────────────────────────────
    # NOTE: vyos/vyos Docker Hub images are build-environment only and don't
    # exist for ARM64/sagitta. This node uses a custom Alpine+nftables image
    # that enforces the identical policy defined in vyos/bootstrap-config.boot.
    # The VyOS config file documents policy in VyOS CLI syntax for the resume/portfolio.
    vyos:
      kind: linux
      image: lab-firewall:latest
      cap-add:
        - NET_ADMIN
        - NET_RAW
      sysctls:
        net.ipv4.ip_forward: 1
      binds:
        - vyos/bootstrap-config.boot:/opt/vyatta/etc/config/config.boot:ro

    # ─── DMZ zone (10.10.10.0/24) ────────────────────────────────────────────
    nginx-dmz:
      kind: linux
      image: lab-nginx-dmz:latest  # built by: make build
      exec:
        - "ip addr add 10.10.10.10/24 dev eth1"
        - "ip route add 10.10.0.0/16 via 10.10.10.1 || true"

    kali:
      kind: linux
      image: kalilinux/kali-rolling
      binds:
        - tests/attacks:/opt/attacks
      exec:
        - "ip addr add 10.10.10.20/24 dev eth1"
        - "ip route add 10.10.0.0/16 via 10.10.10.1 || true"

    # ─── Internal zone (10.10.20.0/24) ───────────────────────────────────────
    workstation:
      kind: linux
      image: lab-workstation:latest  # built by: make build
      exec:
        - "ip addr add 10.10.20.10/24 dev eth1"
        - "ip route add 10.10.0.0/16 via 10.10.20.1 || true"

    # ─── Data zone (10.10.30.0/24) ───────────────────────────────────────────
    postgres-db:
      kind: linux
      image: lab-postgres:latest  # built by: make build
      exec:
        - "ip addr add 10.10.30.10/24 dev eth1"
        - "ip route add 10.10.0.0/16 via 10.10.30.1 || true"

    # ─── Management zone (10.10.40.0/24) ─────────────────────────────────────
    admin-mgmt:
      kind: linux
      image: lab-admin-mgmt:latest  # built by: make build
      exec:
        - "ip addr add 10.10.40.10/24 dev eth1"
        - "ip route add 10.10.0.0/16 via 10.10.40.1 || true"

    # ─── Detection plane ─────────────────────────────────────────────────────
    suricata:
      kind: linux
      image: jasonish/suricata:7.0
      cap-add:
        - NET_ADMIN
        - NET_RAW
        - SYS_NICE
        - IPC_LOCK
      # Sleep at start — Containerlab attaches eth1-4 AFTER container starts.
      # Suricata is launched via exec once interfaces exist.
      entrypoint: /bin/sh
      cmd: -c "sleep infinity"
      binds:
        - suricata/suricata.yaml:/etc/suricata/suricata.yaml:ro
        - suricata/custom-rules:/etc/suricata/rules/custom:ro
        - logs/suricata:/var/log/suricata
      exec:
        - "suricata -c /etc/suricata/suricata.yaml --af-packet -D"

    filebeat:
      kind: linux
      image: docker.elastic.co/beats/filebeat:8.11.3
      user: root
      binds:
        - filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
        - filebeat/certs:/etc/filebeat/certs:ro
        - logs/suricata:/suricata-logs:ro

  # ─── Links ───────────────────────────────────────────────────────────────
  links:
    # VyOS uplinks to each zone bridge (endpoint names must be unique in host ns)
    - endpoints: ["vyos:eth1", "br-dmz:fw-dmz"]
    - endpoints: ["vyos:eth2", "br-internal:fw-int"]
    - endpoints: ["vyos:eth3", "br-data:fw-data"]
    - endpoints: ["vyos:eth4", "br-mgmt:fw-mgmt"]

    # DMZ endpoints
    - endpoints: ["nginx-dmz:eth1", "br-dmz:ep-nginx"]
    - endpoints: ["kali:eth1", "br-dmz:ep-kali"]

    # Internal endpoints
    - endpoints: ["workstation:eth1", "br-internal:ep-ws"]

    # Data endpoints
    - endpoints: ["postgres-db:eth1", "br-data:ep-pg"]

    # Management endpoints
    - endpoints: ["admin-mgmt:eth1", "br-mgmt:ep-admin"]

    # Suricata passive taps on every zone bridge
    - endpoints: ["suricata:eth1", "br-dmz:ids-dmz"]
    - endpoints: ["suricata:eth2", "br-internal:ids-int"]
    - endpoints: ["suricata:eth3", "br-data:ids-data"]
    - endpoints: ["suricata:eth4", "br-mgmt:ids-mgmt"]
